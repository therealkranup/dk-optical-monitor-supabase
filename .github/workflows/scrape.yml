name: Scrape DK Optical Social Media

on:
  # Run manually from the GitHub Actions tab — click "Run workflow"
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of posts to scrape (e.g. 7 or 30)'
        required: false
        default: '30'

  # Also run automatically every Monday at 7am UTC
  schedule:
    - cron: '0 7 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-scrape.txt

      - name: Run scraper
        run: python run.py scrape ${{ github.event.inputs.days || 30 }}
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
