<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Optical Social Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232735;
            --border: #2d3245;
            --text: #e4e6f0;
            --text-muted: #8b90a5;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --fb: #1877f2;
            --ig: #e4405f;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        a { color: var(--accent-light); text-decoration: none; }
        .app { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header h1 span.icon { font-size: 28px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn:hover { border-color: var(--accent); background: var(--surface); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-light); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* Tabs / Filters */
        .filter-bar { display: flex; gap: 24px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
        .filter-btn { padding: 6px 14px; border-radius: 7px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
        .filter-btn.active { background: var(--accent); color: white; }
        .filter-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }
        .filter-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

        /* Stats cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
        .stat-card .company-name { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .stat-card .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .stat-card .stat-label { font-size: 12px; color: var(--text-muted); }
        .stat-card .stat-value { font-size: 16px; font-weight: 700; }
        .stat-card .platform-pills { display: flex; gap: 6px; margin-top: 10px; }
        .platform-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: white; }
        .platform-pill.facebook { background: var(--fb); }
        .platform-pill.instagram { background: var(--ig); }

        /* Comparison bar chart */
        .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .chart-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: flex; align-items: center; gap: 12px; }
        .bar-label { width: 110px; font-size: 13px; font-weight: 500; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { flex: 1; height: 28px; background: var(--surface2); border-radius: 6px; overflow: hidden; display: flex; position: relative; }
        .bar-segment { height: 100%; transition: width .4s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; min-width: 0; }
        .bar-segment.facebook { background: var(--fb); }
        .bar-segment.instagram { background: var(--ig); }
        .bar-value { width: 60px; text-align: right; font-size: 14px; font-weight: 700; flex-shrink: 0; }

        /* Posts feed */
        .posts-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .posts-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .post-list { display: flex; flex-direction: column; gap: 12px; }
        .post-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color .15s; }
        .post-card:hover { border-color: var(--accent); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 10px; }
        .post-meta { display: flex; align-items: center; gap: 8px; }
        .post-company { font-weight: 600; font-size: 13px; }
        .post-date { font-size: 12px; color: var(--text-muted); }
        .post-text { font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 10px; max-height: 80px; overflow: hidden; position: relative; }
        .post-text.expanded { max-height: none; }
        .post-engagement { display: flex; gap: 16px; }
        .engagement-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .engagement-item .count { font-weight: 600; color: var(--text); }

        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Status banner */
        .status-banner { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .status-banner.info { background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3); }
        .status-banner.success { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3); }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

        /* View toggle */
        .view-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; gap: 12px; }
            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// --- Supabase client ---
const SUPABASE_URL = 'https://kwbmzwgxancdkjkxtmgc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_K4nTr6wnfLt9qODOhoADnw_fPn_MlS_';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// GitHub Actions trigger URL (opens the manual run page)
const SCRAPE_ACTION_URL = 'https://github.com/therealkranup/dk-optical-monitor/actions/workflows/scrape.yml';

// Hardcoded company list (matches backend/config/companies.py)
const COMPANIES = [
    { id: 'synoptik',     name: 'Synoptik' },
    { id: 'louis_nielsen',name: 'Louis Nielsen' },
    { id: 'profil_optik', name: 'Profil Optik' },
    { id: 'thiele',       name: 'Thiele' },
    { id: 'nyt_syn',      name: 'Nyt Syn' },
];

// --- Helpers ---
function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' });
}

function platformIcon(p) {
    if (p === 'facebook') return 'f';
    if (p === 'instagram') return 'IG';
    return p;
}

function formatNum(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
}

// --- Supabase queries ---
async function fetchPosts(companyFilter, platformFilter, timeFilter) {
    let query = supabase
        .from('posts')
        .select('*')
        .order('date', { ascending: false })
        .limit(500);

    if (companyFilter) query = query.eq('company_id', companyFilter);
    if (platformFilter) query = query.eq('platform', platformFilter);
    if (timeFilter) {
        const cutoff = new Date(Date.now() - timeFilter * 24 * 60 * 60 * 1000).toISOString();
        query = query.gte('date', cutoff);
    }

    const { data, error } = await query;
    if (error) throw error;
    return data || [];
}

// Compute stats from posts array (no extra DB call needed)
function computeStats(posts) {
    const stats = {};
    for (const post of posts) {
        if (!stats[post.company_id]) {
            stats[post.company_id] = {
                company_id: post.company_id,
                company_name: post.company_name,
                platforms: {},
                totals: { posts: 0, likes: 0, comments: 0, shares: 0 },
            };
        }
        const c = stats[post.company_id];
        if (!c.platforms[post.platform]) {
            c.platforms[post.platform] = { post_count: 0, total_likes: 0, total_comments: 0, total_shares: 0 };
        }
        const p = c.platforms[post.platform];
        p.post_count++;
        p.total_likes += post.likes || 0;
        p.total_comments += post.comments || 0;
        p.total_shares += post.shares || 0;
        c.totals.posts++;
        c.totals.likes += post.likes || 0;
        c.totals.comments += post.comments || 0;
        c.totals.shares += post.shares || 0;
    }
    return stats;
}

// --- Components ---
function Header() {
    return (
        <div className="header">
            <h1>
                <span className="icon">🔭</span>
                DK Optical Social Monitor
            </h1>
            <div className="header-actions">
                <a className="btn btn-primary" href={SCRAPE_ACTION_URL} target="_blank" rel="noopener">
                    ⟳ Run Scrape
                </a>
            </div>
        </div>
    );
}

function FilterBar({ timeFilter, setTimeFilter, platformFilter, setPlatformFilter, companyFilter, setCompanyFilter, view, setView }) {
    return (
        <div className="filter-bar">
            <div>
                <div className="filter-label" style={{marginBottom:4}}>Time</div>
                <div className="filter-group">
                    <button className={`filter-btn ${timeFilter === 1 ? 'active' : ''}`} onClick={() => setTimeFilter(1)}>24h</button>
                    <button className={`filter-btn ${timeFilter === 7 ? 'active' : ''}`} onClick={() => setTimeFilter(7)}>7 days</button>
                    <button className={`filter-btn ${timeFilter === 30 ? 'active' : ''}`} onClick={() => setTimeFilter(30)}>30 days</button>
                </div>
            </div>
            <div>
                <div className="filter-label" style={{marginBottom:4}}>Platform</div>
                <div className="filter-group">
                    <button className={`filter-btn ${platformFilter === '' ? 'active' : ''}`} onClick={() => setPlatformFilter('')}>All</button>
                    <button className={`filter-btn ${platformFilter === 'facebook' ? 'active' : ''}`} onClick={() => setPlatformFilter('facebook')} style={platformFilter==='facebook'?{background:'var(--fb)'}:{}}>FB</button>
                    <button className={`filter-btn ${platformFilter === 'instagram' ? 'active' : ''}`} onClick={() => setPlatformFilter('instagram')} style={platformFilter==='instagram'?{background:'var(--ig)'}:{}}>IG</button>
                </div>
            </div>
            <div>
                <div className="filter-label" style={{marginBottom:4}}>Company</div>
                <div className="filter-group">
                    <button className={`filter-btn ${companyFilter === '' ? 'active' : ''}`} onClick={() => setCompanyFilter('')}>All</button>
                    {COMPANIES.map(c => (
                        <button key={c.id} className={`filter-btn ${companyFilter === c.id ? 'active' : ''}`} onClick={() => setCompanyFilter(c.id)}>
                            {c.name.length > 12 ? c.name.slice(0, 10) + '…' : c.name}
                        </button>
                    ))}
                </div>
            </div>
            <div style={{marginLeft:'auto'}}>
                <div className="filter-label" style={{marginBottom:4}}>View</div>
                <div className="view-tabs">
                    <button className={`filter-btn ${view === 'overview' ? 'active' : ''}`} onClick={() => setView('overview')}>Overview</button>
                    <button className={`filter-btn ${view === 'feed' ? 'active' : ''}`} onClick={() => setView('feed')}>Feed</button>
                </div>
            </div>
        </div>
    );
}

function StatsCards({ stats }) {
    const entries = Object.values(stats);
    if (!entries.length) return null;
    return (
        <div className="stats-grid">
            {entries.map(company => (
                <div className="stat-card" key={company.company_id}>
                    <div className="company-name">{company.company_name}</div>
                    <div className="stat-row">
                        <span className="stat-label">Total Posts</span>
                        <span className="stat-value">{company.totals.posts}</span>
                    </div>
                    <div className="stat-row">
                        <span className="stat-label">Total Likes</span>
                        <span className="stat-value">{formatNum(company.totals.likes)}</span>
                    </div>
                    <div className="stat-row">
                        <span className="stat-label">Total Comments</span>
                        <span className="stat-value">{formatNum(company.totals.comments)}</span>
                    </div>
                    <div className="stat-row">
                        <span className="stat-label">Total Shares</span>
                        <span className="stat-value">{formatNum(company.totals.shares)}</span>
                    </div>
                    <div className="platform-pills">
                        {Object.entries(company.platforms).map(([plat, data]) => (
                            <span key={plat} className={`platform-pill ${plat}`}>
                                {plat === 'facebook' ? 'FB' : 'IG'} {data.post_count}
                            </span>
                        ))}
                    </div>
                </div>
            ))}
        </div>
    );
}

function EngagementChart({ stats, metric }) {
    const entries = Object.values(stats);
    if (!entries.length) return null;
    const maxVal = Math.max(...entries.map(c => c.totals[metric] || 0), 1);
    return (
        <div className="chart-section">
            <h3>Engagement Comparison — {metric.charAt(0).toUpperCase() + metric.slice(1)}</h3>
            <div className="bar-chart">
                {entries.map(company => {
                    const total = company.totals[metric] || 0;
                    const fb = company.platforms.facebook ? company.platforms.facebook[`total_${metric}`] || 0 : 0;
                    const ig = company.platforms.instagram ? company.platforms.instagram[`total_${metric}`] || 0 : 0;
                    return (
                        <div className="bar-row" key={company.company_id}>
                            <div className="bar-label">{company.company_name}</div>
                            <div className="bar-track">
                                {fb > 0 && <div className="bar-segment facebook" style={{width:`${(fb/maxVal)*100}%`}} title={`FB: ${fb}`}>{fb > maxVal*0.08 ? formatNum(fb) : ''}</div>}
                                {ig > 0 && <div className="bar-segment instagram" style={{width:`${(ig/maxVal)*100}%`}} title={`IG: ${ig}`}>{ig > maxVal*0.08 ? formatNum(ig) : ''}</div>}
                            </div>
                            <div className="bar-value">{formatNum(total)}</div>
                        </div>
                    );
                })}
            </div>
            <div style={{display:'flex',gap:16,marginTop:12,justifyContent:'center'}}>
                <span style={{fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:4}}>
                    <span style={{width:10,height:10,borderRadius:2,background:'var(--fb)',display:'inline-block'}}></span> Facebook
                </span>
                <span style={{fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:4}}>
                    <span style={{width:10,height:10,borderRadius:2,background:'var(--ig)',display:'inline-block'}}></span> Instagram
                </span>
            </div>
        </div>
    );
}

function PostCard({ post }) {
    const [expanded, setExpanded] = useState(false);
    return (
        <div className="post-card">
            <div className="post-header">
                <div className="post-meta">
                    <span className={`platform-pill ${post.platform}`}>{platformIcon(post.platform)}</span>
                    <span className="post-company">{post.company_name}</span>
                    <span className="post-date">{formatDate(post.date)}</span>
                </div>
                {post.media_type && post.media_type !== 'text' && (
                    <span style={{fontSize:11,color:'var(--text-muted)',background:'var(--surface)',padding:'2px 8px',borderRadius:4}}>
                        {post.media_type === 'image' ? '🖼' : post.media_type === 'video' ? '🎥' : post.media_type === 'carousel' ? '📸' : '🔗'} {post.media_type}
                    </span>
                )}
            </div>
            <div className={`post-text ${expanded ? 'expanded' : ''}`} onClick={() => setExpanded(!expanded)}>
                {post.text || <em style={{color:'var(--text-muted)'}}>No caption</em>}
            </div>
            <div className="post-engagement">
                <span className="engagement-item">❤️ <span className="count">{formatNum(post.likes)}</span></span>
                <span className="engagement-item">💬 <span className="count">{formatNum(post.comments)}</span></span>
                {post.shares > 0 && <span className="engagement-item">🔄 <span className="count">{formatNum(post.shares)}</span></span>}
                <a href={post.post_url} target="_blank" rel="noopener" style={{marginLeft:'auto',fontSize:12}}>View →</a>
            </div>
        </div>
    );
}

function PostsFeed({ posts, loading }) {
    if (loading) return <div className="loading"><span className="spinner"></span> Loading posts...</div>;
    if (!posts.length) return (
        <div className="empty-state">
            <div className="icon">📭</div>
            <h3>No posts found</h3>
            <p>Try adjusting filters or run a scrape from GitHub Actions.</p>
        </div>
    );
    return (
        <div className="posts-section">
            <h3>
                Recent Posts
                <span style={{fontSize:13,fontWeight:400,color:'var(--text-muted)'}}>{posts.length} posts</span>
            </h3>
            <div className="post-list">
                {posts.map((post, i) => <PostCard key={post.post_id || i} post={post} />)}
            </div>
        </div>
    );
}

// --- Main App ---
function App() {
    const [posts, setPosts] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);

    const [timeFilter, setTimeFilter] = useState(30);
    const [platformFilter, setPlatformFilter] = useState('');
    const [companyFilter, setCompanyFilter] = useState('');
    const [view, setView] = useState('overview');
    const [chartMetric, setChartMetric] = useState('likes');

    useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setError(null);

        fetchPosts(companyFilter, platformFilter, timeFilter)
            .then(data => {
                if (!cancelled) {
                    setPosts(data);
                    setLoading(false);
                }
            })
            .catch(e => {
                if (!cancelled) {
                    console.error('Supabase error:', e);
                    setError(e.message);
                    setLoading(false);
                }
            });

        return () => { cancelled = true; };
    }, [timeFilter, platformFilter, companyFilter]);

    const stats = useMemo(() => computeStats(posts), [posts]);

    const filteredStats = useMemo(() => {
        if (!companyFilter) return stats;
        return stats[companyFilter] ? { [companyFilter]: stats[companyFilter] } : {};
    }, [stats, companyFilter]);

    return (
        <div className="app">
            <Header />

            {error && (
                <div className="status-banner" style={{background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',marginBottom:16}}>
                    ⚠️ Could not load data: {error}
                </div>
            )}

            {!loading && posts.length === 0 && !error && (
                <div className="status-banner info">
                    ℹ️ No data yet.{' '}
                    <a href={SCRAPE_ACTION_URL} target="_blank" rel="noopener">
                        Run a scrape on GitHub Actions →
                    </a>
                </div>
            )}

            <FilterBar
                timeFilter={timeFilter} setTimeFilter={setTimeFilter}
                platformFilter={platformFilter} setPlatformFilter={setPlatformFilter}
                companyFilter={companyFilter} setCompanyFilter={setCompanyFilter}
                view={view} setView={setView}
            />

            {view === 'overview' ? (
                <>
                    <StatsCards stats={filteredStats} />
                    <div style={{display:'flex',gap:8,marginBottom:12}}>
                        {['likes','comments','shares','posts'].map(m => (
                            <button key={m} className={`btn btn-sm ${chartMetric === m ? 'btn-primary' : ''}`} onClick={() => setChartMetric(m)}>
                                {m.charAt(0).toUpperCase() + m.slice(1)}
                            </button>
                        ))}
                    </div>
                    <EngagementChart stats={filteredStats} metric={chartMetric} />
                    <PostsFeed posts={posts.slice(0, 20)} loading={loading} />
                </>
            ) : (
                <PostsFeed posts={posts} loading={loading} />
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
